<svg viewBox="0 0 900 300" xmlns="http://www.w3.org/2000/svg">
  <style>
    text { font-family: 'IBM Plex Mono', ui-monospace, monospace; }
    .cap  { fill: rgba(207,231,216,0.6); font-size: 16px; }
    .lbl  { fill: #cfe7d8; font-size: 12px; }
    .dim  { fill: rgba(207,231,216,0.45); font-size: 11px; }
    .grn  { fill: #7dffb2; }
  </style>
  <defs>
    <!-- 31×31 patch grid: 7px cells -->
    <pattern id="patch" width="7" height="7" patternUnits="userSpaceOnUse">
      <rect width="7" height="7" fill="rgba(207,231,216,0.04)"
            stroke="rgba(207,231,216,0.10)" stroke-width="0.4"/>
    </pattern>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="7" refY="3.5" orient="auto">
      <path d="M0 0 L7 3.5 L0 7 Z" fill="#22c55e"/>
    </marker>
  </defs>

  <!-- ══════════════ 1 · 31×31 patch with sampled pairs ══════════════ -->
  <!-- patch = 217×217 (31 cells × 7px), origin (40,40) -->
  <rect x="40" y="40" width="217" height="217" fill="url(#patch)"
        stroke="rgba(207,231,216,0.25)" stroke-width="1"/>

  <!-- faint sample pairs: blue line + endpoint dots -->
  <g stroke="rgba(96,165,250,0.4)" stroke-width="1">
    <line x1="78"  y1="200" x2="150" y2="100"/>
    <line x1="190" y1="72"  x2="232" y2="210"/>
    <line x1="108" y1="232" x2="66"  y2="138"/>
    <line x1="206" y1="158" x2="138" y2="196"/>
    <line x1="160" y1="66"  x2="118" y2="124"/>
  </g>
  <g fill="rgba(96,165,250,0.6)">
    <circle cx="78"  cy="200" r="2.6"/><circle cx="150" cy="100" r="2.6"/>
    <circle cx="190" cy="72"  r="2.6"/><circle cx="232" cy="210" r="2.6"/>
    <circle cx="108" cy="232" r="2.6"/><circle cx="66"  cy="138" r="2.6"/>
    <circle cx="206" cy="158" r="2.6"/><circle cx="138" cy="196" r="2.6"/>
    <circle cx="160" cy="66"  r="2.6"/><circle cx="118" cy="124" r="2.6"/>
  </g>

  <!-- highlighted pair (aᵢ , bᵢ) -->
  <line x1="92" y1="92" x2="222" y2="150" stroke="#60a5fa" stroke-width="1.8"/>
  <circle cx="92"  cy="92"  r="4" fill="#60a5fa"/>
  <circle cx="222" cy="150" r="4" fill="#60a5fa"/>
  <text x="86"  y="86"  text-anchor="end" class="lbl" fill="#60a5fa">a<tspan font-size="9" dy="2">i</tspan></text>
  <text x="230" y="148" class="lbl" fill="#60a5fa">b<tspan font-size="9" dy="2">i</tspan></text>

  <!-- centre keypoint p -->
  <rect x="145.5" y="145.5" width="6" height="6" fill="#cfe7d8"/>
  <text x="148.5" y="140" text-anchor="middle" font-style="italic" class="lbl">p</text>

  <text x="148.5" y="278" text-anchor="middle" class="cap">31×31 patch · 256 fixed pairs</text>

  <!-- arrow patch → compare -->
  <line x1="270" y1="148" x2="330" y2="148" stroke="#22c55e" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ══════════════ 2 · intensity comparison ══════════════ -->
  <!-- aᵢ chip (darker) -->
  <rect x="352" y="108" width="30" height="30" fill="rgba(207,231,216,0.16)" stroke="#60a5fa" stroke-width="1.2"/>
  <text x="367" y="128" text-anchor="middle" class="lbl">a<tspan font-size="9" dy="2">i</tspan></text>
  <text x="367" y="152" text-anchor="middle" class="dim">I=74</text>
  <!-- bᵢ chip (brighter) -->
  <rect x="352" y="166" width="30" height="30" fill="rgba(207,231,216,0.62)" stroke="#60a5fa" stroke-width="1.2"/>
  <text x="367" y="186" text-anchor="middle" font-size="12" fill="#0f1a14">b<tspan font-size="9" dy="2">i</tspan></text>
  <text x="367" y="210" text-anchor="middle" class="dim">I=183</text>

  <!-- comparison rule -->
  <text x="402" y="146" class="lbl">I(a<tspan font-size="9" dy="2">i</tspan><tspan dy="-2">) &lt; I(b</tspan><tspan font-size="9" dy="2">i</tspan><tspan dy="-2">)</tspan></text>
  <text x="402" y="172" class="dim">true</text>
  <text x="402" y="198" font-size="20" class="grn">&#964;<tspan font-size="11" dy="3">i</tspan><tspan dy="-3" font-size="20"> = 1</tspan></text>

  <text x="430" y="278" text-anchor="middle" class="cap">compare intensities</text>

  <!-- arrow compare → string -->
  <line x1="500" y1="148" x2="556" y2="148" stroke="#22c55e" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ══════════════ 3 · 256-bit string ══════════════ -->
  <!-- strip: 14 cells of 21px from x=566 -->
  <g fill="rgba(207,231,216,0.05)" stroke="rgba(207,231,216,0.12)" stroke-width="0.6">
    <rect x="587" y="136" width="21" height="24"/><rect x="608" y="136" width="21" height="24"/>
    <rect x="629" y="136" width="21" height="24"/><rect x="650" y="136" width="21" height="24"/>
    <rect x="671" y="136" width="21" height="24"/><rect x="692" y="136" width="21" height="24"/>
    <rect x="713" y="136" width="21" height="24"/><rect x="734" y="136" width="21" height="24"/>
    <rect x="755" y="136" width="21" height="24"/><rect x="776" y="136" width="21" height="24"/>
    <rect x="797" y="136" width="21" height="24"/><rect x="818" y="136" width="21" height="24"/>
    <rect x="839" y="136" width="21" height="24"/>
  </g>
  <!-- first cell = the bit τᵢ we just produced -->
  <rect x="566" y="136" width="21" height="24" fill="rgba(125,255,178,0.5)" stroke="#7dffb2" stroke-width="1.4"/>

  <!-- bit values -->
  <g text-anchor="middle" font-size="12" fill="rgba(207,231,216,0.9)">
    <text x="576.5" y="153" fill="#0f1a14" font-weight="600">1</text>
    <text x="597.5" y="153">0</text><text x="618.5" y="153">1</text><text x="639.5" y="153">1</text>
    <text x="660.5" y="153">0</text><text x="681.5" y="153">1</text><text x="702.5" y="153">0</text>
    <text x="723.5" y="153">0</text><text x="744.5" y="153">1</text><text x="765.5" y="153">0</text>
    <text x="786.5" y="153">1</text><text x="807.5" y="153">1</text><text x="828.5" y="153">0</text>
    <text x="849.5" y="153">1</text>
  </g>
  <text x="872" y="153" class="dim">…</text>

  <!-- pointer to the highlighted bit -->
  <text x="576.5" y="128" text-anchor="middle" font-size="11" class="grn">&#964;<tspan font-size="8" dy="2">i</tspan></text>

  <text x="719" y="278" text-anchor="middle" class="cap">256-bit descriptor</text>
</svg>
